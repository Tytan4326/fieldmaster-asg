services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fieldmaster
      POSTGRES_USER: fieldmaster
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldmaster"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
volumes:
  postgres_data:
