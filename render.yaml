services:
  - type: web
    name: fieldmaster
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_CALLSIGN
        value: GAME-MASTER
      - key: ADMIN_PASSWORD
        sync: false
